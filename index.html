<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sol Bot Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0f14; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; padding: 40px 20px; }
  .card { background: #12141a; border: 1px solid #1e2028; border-radius: 12px; padding: 32px 40px; text-align: center; text-decoration: none; color: inherit; transition: border-color .2s, transform .15s; min-width: 180px; }
  .card:hover { border-color: #61abff; transform: translateY(-2px); }
  .card .icon { font-size: 36px; margin-bottom: 12px; }
  .card .label { font-size: 15px; font-weight: 600; color: #e2e8f0; }
  .card .sub { font-size: 12px; color: #64748b; margin-top: 4px; }
  h1 { text-align: center; font-size: 22px; color: #61abff; margin-bottom: 32px; width: 100%; }
</style>
</head>
<body>
<div style="width:100%">
  <div class="cards">
    <h1>🎯 Sol Bot Dashboard</h1>
    <a class="card" href="/scan.html">
      <div class="icon">🔭</div>
      <div class="label">Scanner</div>
      <div class="sub">All candidates</div>
    </a>
    <a class="card" href="/security.html">
      <div class="icon">🔍</div>
      <div class="label">Security Check</div>
      <div class="sub">Rug / bundle analysis</div>
    </a>
    <a class="card" href="/tgcalls.html">
      <div class="icon">📡</div>
      <div class="label">TG Calls</div>
      <div class="sub">Alpha channel signals</div>
    </a>
  </div>
</div>
</body>
</html>
